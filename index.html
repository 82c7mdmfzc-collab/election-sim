<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/icon-180.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=5" />
    <!--
      Native-runtime shim. In the Tauri iOS webview the page must feel like an app,
      not a website: no pinch-zoom, no document scroll/rubber-band, no long-press
      selection. Detect the custom protocol (tauri:) BEFORE first paint, tag <html>
      so the CSS lockdown (src/index.css `html.native`) applies with no flash, and
      tighten the viewport to forbid zoom. The web build keeps the permissive meta
      above (zoom allowed for accessibility). ES5-safe — runs un-transpiled on old
      WebViews; must not block boot.
    -->
    <script>
      (function () {
        try {
          if (String(window.location.protocol).indexOf('tauri') !== 0) return;
          document.documentElement.classList.add('native');
          var vp = document.querySelector('meta[name="viewport"]');
          if (vp) {
            vp.setAttribute(
              'content',
              'width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1, user-scalable=no',
            );
          }
        } catch (e) { /* never block boot on this */ }
      })();
    </script>
    <meta name="theme-color" content="#0b1426" />
    <!-- Paint the brand navy (--bg) on the very first frame so neither the native
         WKWebView nor the web page flashes white before the bundle CSS loads. -->
    <style>html,body{background:#0b1426}</style>
    <title>Elector — Win the Electoral College</title>
    <meta name="description" content="Elector — a satirical strategy game about winning the US Electoral College. Campaign, build coalitions, and race to 270. A parody; not affiliated with or endorsed by anyone depicted." />
    <link rel="canonical" href="https://www.playelector.com/" />

    <!-- Open Graph / social share -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Elector" />
    <meta property="og:title" content="Elector — Win the Electoral College" />
    <meta property="og:description" content="A satirical strategy game. Campaign across the states, build coalitions, and race to 270 — solo, vs bots, or online." />
    <meta property="og:url" content="https://www.playelector.com/" />
    <meta property="og:image" content="https://www.playelector.com/assets/brand/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:type" content="image/png" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Elector — Win the Electoral College" />
    <meta name="twitter:description" content="A satirical strategy game. Campaign across the states, build coalitions, and race to 270 — solo, vs bots, or online." />
    <meta name="twitter:image" content="https://www.playelector.com/assets/brand/og-image.png" />

    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Saira+Condensed:wght@500;600;700;800&family=Outfit:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />

    <!--
      iOS 14.0–15.3 WKWebView polyfill shim. Our IPHONEOS_DEPLOYMENT_TARGET is 14.0,
      and that WebView lacks several Safari-15.4+ runtime APIs. If ANY bundled
      dependency (or app code) calls one at module-eval, it throws before React
      mounts -> blank/error screen. esbuild/Vite never polyfill runtime APIs (only
      syntax), so we install them here, only-if-missing, BEFORE the module bundle.
      Plain ES5-safe syntax: served un-transpiled to old WebViews; must not itself
      use any of the APIs it polyfills.
    -->
    <script>
      (function () {
        var g = typeof globalThis !== 'undefined' ? globalThis : window;
        var HEX = [];
        for (var h = 0; h < 256; h++) HEX[h] = (h + 0x100).toString(16).slice(1);

        function defineMethod(target, name, fn) {
          try {
            Object.defineProperty(target, name, { value: fn, configurable: true, writable: true });
          } catch (e) { /* frozen/read-only prototype — ignore */ }
        }

        function deepClone(value, seen) {
          if (value === null || typeof value !== 'object') return value;
          if (seen.has(value)) return seen.get(value);
          var out, i, key;
          if (value instanceof Date) return new Date(value.getTime());
          if (value instanceof RegExp) return new RegExp(value.source, value.flags);
          if (typeof Map !== 'undefined' && value instanceof Map) {
            out = new Map(); seen.set(value, out);
            value.forEach(function (v, k) { out.set(deepClone(k, seen), deepClone(v, seen)); });
            return out;
          }
          if (typeof Set !== 'undefined' && value instanceof Set) {
            out = new Set(); seen.set(value, out);
            value.forEach(function (v) { out.add(deepClone(v, seen)); });
            return out;
          }
          if (Array.isArray(value)) {
            out = []; seen.set(value, out);
            for (i = 0; i < value.length; i++) out[i] = deepClone(value[i], seen);
            return out;
          }
          out = {}; seen.set(value, out);
          for (key in value) {
            if (Object.prototype.hasOwnProperty.call(value, key)) out[key] = deepClone(value[key], seen);
          }
          return out;
        }

        function atImpl(n) {
          var len = this.length;
          n = Math.trunc(n) || 0;
          if (n < 0) n += len;
          if (n < 0 || n >= len) return undefined;
          return this[n];
        }

        // structuredClone (Safari 15.4+)
        if (typeof g.structuredClone !== 'function') {
          g.structuredClone = function (input) { return deepClone(input, new Map()); };
        }
        // Object.hasOwn (Safari 15.4+)
        if (typeof Object.hasOwn !== 'function') {
          defineMethod(Object, 'hasOwn', function (obj, prop) {
            return Object.prototype.hasOwnProperty.call(obj, prop);
          });
        }
        // Array/String.prototype.at (Safari 15.4+)
        if (typeof Array.prototype.at !== 'function') defineMethod(Array.prototype, 'at', atImpl);
        if (typeof String.prototype.at !== 'function') defineMethod(String.prototype, 'at', atImpl);
        // Array.prototype.findLast / findLastIndex (Safari 15.4+)
        if (typeof Array.prototype.findLast !== 'function') {
          defineMethod(Array.prototype, 'findLast', function (cb, thisArg) {
            for (var i = this.length - 1; i >= 0; i--) {
              if (cb.call(thisArg, this[i], i, this)) return this[i];
            }
            return undefined;
          });
        }
        if (typeof Array.prototype.findLastIndex !== 'function') {
          defineMethod(Array.prototype, 'findLastIndex', function (cb, thisArg) {
            for (var i = this.length - 1; i >= 0; i--) {
              if (cb.call(thisArg, this[i], i, this)) return i;
            }
            return -1;
          });
        }
        // crypto.randomUUID (Safari 15.4+)
        if (g.crypto && typeof g.crypto.randomUUID !== 'function') {
          defineMethod(g.crypto, 'randomUUID', function () {
            var b, i;
            if (g.crypto.getRandomValues) {
              b = g.crypto.getRandomValues(new Uint8Array(16));
            } else {
              b = new Uint8Array(16);
              for (i = 0; i < 16; i++) b[i] = Math.floor(Math.random() * 256);
            }
            b[6] = (b[6] & 0x0f) | 0x40;
            b[8] = (b[8] & 0x3f) | 0x80;
            return HEX[b[0]] + HEX[b[1]] + HEX[b[2]] + HEX[b[3]] + '-' +
              HEX[b[4]] + HEX[b[5]] + '-' + HEX[b[6]] + HEX[b[7]] + '-' +
              HEX[b[8]] + HEX[b[9]] + '-' +
              HEX[b[10]] + HEX[b[11]] + HEX[b[12]] + HEX[b[13]] + HEX[b[14]] + HEX[b[15]];
          });
        }
      })();
    </script>

    <!--
      Blank-screen watchdog. The release iOS WKWebView has no console, so if a
      fatal error still prevents React from mounting, the user would see only the
      empty dark page. This classic script captures the last fatal error and — if
      #root is still empty after 8s — renders it on screen for triage. WebKit's
      error.stack OMITS the "Name: message" header, so we capture name + message
      explicitly; that is the line that actually identifies the failing API.
    -->
    <script>
      (function () {
        var lastError = null;
        function describe(err, fallback) {
          if (err == null) return fallback;
          if (typeof err === 'object') {
            var head = (err.name || 'Error') + ': ' + (err.message != null ? err.message : String(err));
            return err.stack ? head + '\n\n' + err.stack : head;
          }
          return String(err);
        }
        window.addEventListener('error', function (e) {
          var loc = e && e.filename ? '\n' + e.filename + ':' + e.lineno + ':' + e.colno : '';
          lastError = describe(e && e.error, (e && e.message ? e.message : 'Unknown error') + loc);
        });
        window.addEventListener('unhandledrejection', function (e) {
          lastError = describe(e && e.reason, 'Unhandled promise rejection');
        });
        function escapeHtml(s) {
          return String(s).replace(/[&<>]/g, function (ch) {
            return ch === '&' ? '&amp;' : ch === '<' ? '&lt;' : '&gt;';
          });
        }
        window.setTimeout(function () {
          var root = document.getElementById('root');
          if (!root || root.childElementCount > 0) return; // React mounted — all good
          var msg = lastError || 'The app failed to start, but no error was reported.';
          root.innerHTML =
            '<div style="min-height:100vh;display:flex;flex-direction:column;justify-content:center;' +
            'align-items:center;gap:12px;padding:24px;box-sizing:border-box;color:#e8edf6;' +
            'font-family:-apple-system,system-ui,sans-serif;text-align:center;">' +
            '<h1 style="font-size:20px;margin:0;color:#f4c542;">Something went wrong</h1>' +
            '<p style="margin:0;opacity:.85;font-size:14px;">The app could not start on this device.</p>' +
            '<pre style="max-width:100%;overflow:auto;text-align:left;font-size:11px;line-height:1.4;' +
            'opacity:.7;background:rgba(255,255,255,.06);padding:12px;border-radius:8px;white-space:pre-wrap;' +
            'word-break:break-word;">' + escapeHtml(msg) + '</pre>' +
            '</div>';
        }, 8000);
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
