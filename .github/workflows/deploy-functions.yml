name: Deploy Edge Functions (Supabase)

# Redeploys the edge functions whenever they (or the game engine resolve-turn
# vendors) change on main:
#   • resolve-turn    — server-authoritative multiplayer turn resolution.
#     resolve-turn/_engine/ is generated from src/game by
#     scripts/build-edge-function.mjs (it is gitignored), so CI regenerates it
#     before deploying — keeping online turn resolution in lockstep with the
#     client engine (candidates, config, statesData, engine, …).
#   • fulfill-purchase — verifies Apple/Google IAP receipts server-side and
#     credits Campaign Funds. Without this deployed, in-app purchases fail with
#     "Failed to send a request to the Edge Function".
#
# Requires a repo secret SUPABASE_ACCESS_TOKEN (Supabase Dashboard → Account →
# Access Tokens). The project ref is public (it ships in the client), so it is
# inlined rather than kept secret.

on:
  push:
    branches: [main]
    paths:
      - 'supabase/functions/resolve-turn/**'
      - 'supabase/functions/fulfill-purchase/**'
      - 'supabase/functions/admin-broadcast/**'
      - 'supabase/functions/admob-ssv/**'
      - 'supabase/functions/_shared/**'
      - 'src/game/**'
      - 'scripts/build-edge-function.mjs'
      - '.github/workflows/deploy-functions.yml'
  workflow_dispatch: {}

# Never run two function deploys at once.
concurrency:
  group: deploy-functions
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      PROJECT_REF: rwavsfyjjqfwefabcfvv
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Vendor the engine into the edge function (_engine is gitignored)
        run: node scripts/build-edge-function.mjs

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy resolve-turn
        run: |
          set -euo pipefail
          if [ -z "${SUPABASE_ACCESS_TOKEN:-}" ]; then
            echo "::error::SUPABASE_ACCESS_TOKEN secret is not set — create one at Supabase Dashboard → Account → Access Tokens and add it as a repo secret (Settings → Secrets and variables → Actions)."; exit 1
          fi
          supabase functions deploy resolve-turn --project-ref "$PROJECT_REF"
          echo "✅ resolve-turn deployed"

      - name: Deploy fulfill-purchase
        run: |
          set -euo pipefail
          supabase functions deploy fulfill-purchase --project-ref "$PROJECT_REF"
          echo "✅ fulfill-purchase deployed"

      - name: Deploy admin-broadcast
        run: |
          set -euo pipefail
          supabase functions deploy admin-broadcast --project-ref "$PROJECT_REF"
          echo "✅ admin-broadcast deployed"

      - name: Deploy admob-ssv
        run: |
          set -euo pipefail
          supabase functions deploy admob-ssv --no-verify-jwt --project-ref "$PROJECT_REF"
          echo "✅ admob-ssv deployed"
